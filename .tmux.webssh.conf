# Configuración de tmux para WebSSH - Terminal completamente invisible

# Deshabilitar la barra de estado
set -g status off

# Fix scrollback duplication bug:
# `window-size latest` + `aggressive-resize on` used to trigger SIGWINCH on
# every ttyd<->tmux reattach (happens on each MuxTerm restart). TUI apps like
# Claude Code that listen to SIGWINCH re-rendered their entire visible state
# to stdout on each event, and since `alternate-screen off` (below) forces
# that output into the main screen, each restart pushed another copy into
# scrollback. Over ~8 restarts/day users saw 30+ identical copies of the
# same frame when scrolling up.
# `window-size manual` pins the pane size: MuxTerm sets the dimensions
# explicitly at session creation (-x/-y) and only changes them on real
# container resize. No spurious SIGWINCH on reattach → no TUI redraw →
# no accumulation.
set -g window-size largest

# Deshabilitar COMPLETAMENTE todas las teclas de tmux
set -g prefix None
unbind-key -a
unbind-key -T copy-mode -a
unbind-key -T copy-mode-vi -a

# Hide the yellow "[N/total]" copy-mode position indicator (and the
# selection highlight — MuxTerm doesn't use tmux selection, xterm.js
# handles it natively). Painting mode/message styles black-on-black is
# the quietest way to suppress these without disabling copy-mode itself.
set -g mode-style "bg=black,fg=black"
set -g message-style "bg=black,fg=black"

# Mouse OFF - text selection works natively, scroll via ▲▼ buttons
set -g mouse off

# Sin bordes en los paneles
set -g pane-border-style none
set -g pane-active-border-style none

# Sin notificaciones visuales
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g bell-action none

# Terminal por defecto
set -g default-terminal "xterm-256color"

# Historia grande para el scrollback
set -g history-limit 50000

# Sin delays para escape
set -sg escape-time 0

# Evitar que tmux capture cualquier tecla
set -g remain-on-exit off
set -g detach-on-destroy on

# No permitir renombrar ventanas automáticamente
set -g allow-rename off
set -g automatic-rename off

# `aggressive-resize` used to be `on`, but combined with client reattach
# triggered extra resize events on the foreground process — now off, which
# only resizes the pane when the size genuinely changes.
set -g aggressive-resize off
# `alternate-screen` is back to `on` (the tmux default). Previously `off`
# so a `claude`/`vim`/`htop` conversation would survive their `exit` and
# stay inspectable in the scrollback, but the side effect was severe:
# TUI apps that redraw their full buffer (Claude Code does this whenever
# its conversation exceeds the viewport) wrote each redraw to the main
# screen, piling up duplicated copies in the scrollback. `on` matches
# native-terminal behavior — TUIs run on a separate screen, disappear
# cleanly on exit, and the main scrollback stays clean.
set -g alternate-screen on

# Asegurarse de que tmux pase todas las teclas directamente
set -gw xterm-keys on
set -g focus-events off

# Configurar bash como shell por defecto
set -g default-shell /bin/bash
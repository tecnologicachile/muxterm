version: '3.8'

services:
  muxterm:
    build: .
    image: muxterm:latest
    container_name: muxterm
    restart: unless-stopped
    ports:
      - "3002:3002"
      - "4823:4823"
    environment:
      - NODE_ENV=production
    volumes:
      - muxterm-db:/app/db
      - muxterm-data:/app/data
      - muxterm-logs:/app/logs
      - ./certs:/app/certs
      - /tmp/muxterm:/tmp/muxterm
      - /tmp/guac-drive:/tmp/guac-drive

volumes:
  muxterm-db:
  muxterm-data:
  muxterm-logs:
